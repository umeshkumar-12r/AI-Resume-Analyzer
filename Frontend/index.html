<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <meta name="description" content="AI powered resume analyzer to match your skills with job descriptions.">


<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">


</head>

<body>

<div class="background-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="glass-container">

    <!-- HEADER -->
    <header>
        <h1>
            AI Resume Analyzer 
            <i class="fa-solid fa-rocket animate-rocket"></i>
        </h1>
        <p class="subtitle">Match your skills with job requirements instantly</p>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- FILE UPLOAD -->
        <div class="upload-section">

            <!-- 🔥 FIXED UPLOAD (LABEL BASED) -->
            <label class="upload-dropzone" id="upload-dropzone">

                <!-- Hidden file input -->
                <input type="file" id="resume" class="file-input" accept=".pdf">

                <!-- Visible UI -->
                <div class="dropzone-content">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <p class="primary-text">Drag & Drop your resume here</p>
                    <p class="secondary-text">or click to browse (.pdf only)</p>
                </div>

            </label>

            <!-- File name display -->
            <div id="file-name-display" class="file-name-display hidden">
                <i class="fa-solid fa-file-pdf"></i>
                <span id="file-name-text">No file selected</span>
                <i class="fa-solid fa-xmark remove-file" id="remove-file" title="Remove file"></i>
            </div>

        </div>

        <!-- JOB DESCRIPTION -->
        <div class="jd-section">
            <div class="textarea-wrapper">
                <label for="jd">
                    <i class="fa-solid fa-briefcase"></i> Job Description
                </label>
                <textarea id="jd" required
                    placeholder="Paste the complete job description here to analyze against your resume..."></textarea>
            </div>
        </div>

    </div>

    <!-- BUTTONS -->
    <div class="btn-row">

        <button onclick="getAISuggestion()" id="ai-btn">
            🤖 Get AI Suggestions
        </button>

        <button class="btn-primary analyze-btn" id="analyze-btn" onclick="analyze()">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Analyze Resume</span>
        </button>

    </div>

    <!-- LOADING -->
    <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <p>Analyzing and comparing skills...</p>
    </div>

    <!-- RESULTS -->
    <div id="result" class="result-container hidden"></div>

    <!-- AI RESULTS -->
    <div id="ai-result" class="ai-result-container hidden"></div>

    <!-- 🔍 Skill Analysis -->
<div id="skill-analysis-section" class="skill-analysis-section hidden">
    <h2>🔍 Resume Skill Coverage</h2>

    <div id="skill-analysis"></div>
</div>

</div>

<script src="script.js"></script>
```

</body>
</html>
